{{ $items := .Inner | transform.Unmarshal }}
<div class="faq-links">
    <div class="faq-links-header">
        <svg class="faq-links-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span class="faq-links-label">FAQ</span>
    </div>
    <ul class="faq-links-list">
        {{ range $items }}
        {{ $url := .url }}
        {{ $url = strings.TrimSuffix ".md" $url }}
        <li class="faq-links-item">
            <a href="/faq/{{ $url }}" class="faq-links-link">
                <svg class="faq-links-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
                {{ .title }}
            </a>
        </li>
        {{ end }}
    </ul>
</div>
